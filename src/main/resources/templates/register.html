<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Mon App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header .icon-box {
            background: #667eea;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 2rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group-custom i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            z-index: 10;
        }

        .form-control-custom {
            border-radius: 50px;
            padding: 12px 20px 12px 50px;
            border: 1px solid #e1e1e1;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }

        .form-control-custom:focus {
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.15);
            border-color: #667eea;
            background-color: #fff;
        }

        .btn-register {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
            color: white;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .login-link a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="register-header">
        <div class="icon-box">
            <i class="fas fa-user-plus"></i>
        </div>
        <h2 class="fw-bold">Inscription</h2>
        <p class="text-muted">Créez votre compte en quelques secondes</p>
    </div>

    <form method="post" th:action="@{/register}">
        <div class="input-group-custom">
            <i class="fas fa-user"></i>
            <input type="text" name="username" class="form-control form-control-custom" 
                   placeholder="Nom d'utilisateur" required>
        </div>

        <div class="input-group-custom">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" class="form-control form-control-custom" 
                   placeholder="Adresse email" required>
        </div>

        <div class="input-group-custom">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" class="form-control form-control-custom" 
                   placeholder="Mot de passe" required>
        </div>
		
		<div class="input-group-custom">
		    <select name="role" class="form-control select-custom" required>
		        <option value="" disabled selected><i class="fas fa-user-tag"></i> Choisir un rôle</option>
		        <option value="ADMINISTRATEUR">Administrateur</option>
		        <option value="AGENT_ENREGISTREMENT">Agent d'enregistrement</option>
		        <option value="AGENT_VALIDATION">Agent de validation</option>
		        <option value="SUPERVISEUR">Superviseur</option>
		    </select>
		 </div>

        <button type="submit" class="btn btn-register w-100 mt-3">
            Créer mon compte <i class="fas fa-rocket ms-2"></i>
        </button>
    </form>

    <div class="login-link">
        <span class="text-muted small">Déjà inscrit ?</span>
        <a href="/login">Se connecter</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
