<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --sidebar-width: 250px;
      }
      body {
        background-color: #f8f9fa;
      }
      #sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        position: fixed;
        background: #212529;
        transition: all 0.3s;
      }
      #sidebar .nav-link {
        color: #adb5bd;
        margin: 5px 15px;
        border-radius: 5px;
      }
      #sidebar .nav-link:hover,
      #sidebar .nav-link.active {
        background: #343a40;
        color: #fff;
      }
      #content {
        margin-left: var(--sidebar-width);
        width: calc(100% - var(--sidebar-width));
      }
      .stat-card {
        border: none;
        border-left: 5px solid #4e73df;
      }
    </style>
  </head>
  <body>
	<nav id="sidebar" class="d-none d-md-block">
	        <div class="p-3 text-white text-center"><h5>ADMIN PANEL</h5></div>
	        <hr class="text-secondary" />
	        <ul class="nav flex-column">
	            <li class="nav-item">
	                <a href="/dashboard" class="nav-link active"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
	            </li>
	            <li class="nav-item">
	                <a href="/citoyens/liste" class="nav-link"><i class="fas fa-edit me-2"></i> Citoyens</a>
	            </li>
				<li class="nav-item">
				    <a href="/demandes/listedemande" class="nav-link"><i class="fas fa-edit me-2"></i> Citoyens</a>
				</li>
	            
	            <li class="nav-item dropdown px-3">
	                <a class="nav-link dropdown-toggle position-relative" href="#" id="notifDrop" role="button" data-bs-toggle="dropdown">
	                    <i class="fas fa-bell me-2"></i> Notifications
	                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
	                          th:if="${notifications != null and !notifications.isEmpty()}"
	                          th:text="${notifications.size()}">
	                    </span>
	                </a>
	                <ul class="dropdown-menu dropdown-menu-dark shadow" aria-labelledby="notifDrop" style="width: 250px; max-height: 300px; overflow-y: auto;">
	                    <li th:if="${notifications == null or notifications.isEmpty()}" class="p-2 text-center small text-muted">
	                        Aucune notification
	                    </li>
	                    <li th:each="n : ${notifications}">
	                        <div class="dropdown-item border-bottom border-secondary py-2" style="white-space: normal;">
	                            <div class="small fw-bold" th:text="${n.message}"></div>
	                            <small class="text-muted" th:text="${#temporals.format(n.date, 'dd/MM/yyyy HH:mm')}"></small>
	                        </div>
	                    </li>
	                </ul>
	            </li>
	        </ul>
	    </nav>

    <div id="content">
		<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm p-3 mb-4">
		            <div class="container-fluid">
		                <form class="d-flex w-50"><input class="form-control me-2" type="search" placeholder="Rechercher..." /></form>
		                <div class="dropdown">
		                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Admin User <i class="fas fa-user-circle"></i></a>
		                    <ul class="dropdown-menu dropdown-menu-end">
		                        <li><a class="dropdown-item" href="/logout">Déconnexion</a></li>
		                    </ul>
		                </div>
		            </div>
		        </nav>

      <div class="container-fluid px-4">
        <div class="card shadow-sm" id="table-section">
          <div
            class="card-header bg-white d-flex justify-content-between align-items-center"
          >
            <h6 class="mb-0">Liste des demandes</h6>
            <input
              type="text"
              class="form-control form-control-sm w-25"
              placeholder="Filtrer..."
            />
          </div>
		  <div th:if="${success}" class="alert alert-success">
		    <span th:text="${success}"></span>
		  </div>

		  <div th:if="${error}" class="alert alert-danger">
		    <span th:text="${error}"></span>
		  </div>
          <div class="table-responsive">
			<table class="table table-hover">
			      <thead>
			        <tr>
			          <th>Dossier</th>
			          <th>Type</th>
			          <th>Date</th>
			          <th>Statut</th>
			          <th>Agent</th>
			          <th>Actions</th>
			        </tr>
			      </thead>

			      <tbody>
			        <tr th:each="d : ${demandes}">
			          <td th:text="${d.numeroDossier}"></td>
			          <td th:text="${d.type}"></td>
			          <td th:text="${d.dateDepot}"></td>
			          <td>
			            <span class="badge bg-warning" th:text="${d.statut}"></span>
			          </td>
			          <td th:text="${d.agentResponsable.username}"></td>

					  <td>
					    <!-- SI EN ATTENTE -->
					    <div th:if="${d.statut.name() == 'EN_ATTENTE'}">
					      <a th:href="@{'/demandes/statut/' + ${d.id} + '/VALIDEE'}"
					         class="btn btn-success btn-sm">Valider</a>

					      <a th:href="@{'/demandes/statut/' + ${d.id} + '/REJETEE'}"
					         class="btn btn-danger btn-sm">Rejeter</a>
					    </div>

					    <!-- SI VALIDÉ -->
					    <span th:if="${d.statut.name() == 'VALIDEE'}"
					          class="badge bg-success">
					          ✔ Validée
					    </span>

					    <!-- SI REJETÉ -->
					    <span th:if="${d.statut.name() == 'REJETEE'}"
					          class="badge bg-danger">
					          ✖ Rejetée
					    </span>

					  </td>
			        </tr>
			      </tbody>
			    </table>
          </div>
          <div class="card-footer bg-white">
            <nav>
              <ul class="pagination pagination-sm mb-0 justify-content-end">
                <li class="page-item disabled">
                  <a class="page-link" href="#">Précédent</a>
                </li>
                <li class="page-item active">
                  <a class="page-link" href="#">1</a>
                </li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item">
                  <a class="page-link" href="#">Suivant</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
