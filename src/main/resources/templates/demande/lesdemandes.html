<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --sidebar-width: 250px;
      }
      body {
        background-color: #f8f9fa;
      }
      #sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        position: fixed;
        background: #212529;
        transition: all 0.3s;
      }
      #sidebar .nav-link {
        color: #adb5bd;
        margin: 5px 15px;
        border-radius: 5px;
      }
      #sidebar .nav-link:hover,
      #sidebar .nav-link.active {
        background: #343a40;
        color: #fff;
      }
      #content {
        margin-left: var(--sidebar-width);
        width: calc(100% - var(--sidebar-width));
      }
      .stat-card {
        border: none;
        border-left: 5px solid #4e73df;
      }
    </style>
  </head>
  <body>
    <nav id="sidebar" class="d-none d-md-block">
      <div class="p-3 text-white text-center"><h5>ADMIN PANEL</h5></div>
      <hr class="text-secondary" />
      <ul class="nav flex-column">
        <li class="nav-item">
          <a href="#" class="nav-link active"
            ><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a
          >
        </li>
        <li class="nav-item">
          <a href="#form-section" class="nav-link"
            ><i class="fas fa-edit me-2"></i> Formulaires</a
          >
        </li>
        <li class="nav-item">
          <a href="#table-section" class="nav-link"
            ><i class="fas fa-table me-2"></i> Données</a
          >
        </li>
        <li class="nav-item">
          <a href="index.html" class="nav-link"
            ><i class="fas fa-sign-out-alt me-2"></i> Déconnexion</a
          >
        </li>
      </ul>
    </nav>

    <div id="content">
      <nav
        class="navbar navbar-expand-lg navbar-light bg-white shadow-sm p-3 mb-4"
      >
        <div class="container-fluid">
          <form class="d-flex w-50">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Rechercher..."
            />
          </form>
          <div class="dropdown">
            <a
              class="nav-link dropdown-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              >Admin User <i class="fas fa-user-circle"></i
            ></a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#">Profil</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item" href="#">Déconnexion</a></li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container-fluid px-4">
        <div class="card shadow-sm" id="table-section">
          <div
            class="card-header bg-white d-flex justify-content-between align-items-center"
          >
            <h6 class="mb-0">Liste des demandes</h6>
            <input
              type="text"
              class="form-control form-control-sm w-25"
              placeholder="Filtrer..."
            />
          </div>
          <div class="table-responsive">
			<table class="table table-hover">
			      <thead>
			        <tr>
			          <th>Dossier</th>
			          <th>Type</th>
			          <th>Date</th>
			          <th>Statut</th>
			          <th>Agent</th>
			          <th>Actions</th>
			        </tr>
			      </thead>

			      <tbody>
			        <tr th:each="d : ${demandes}">
			          <td th:text="${d.numeroDossier}"></td>
			          <td th:text="${d.type}"></td>
			          <td th:text="${d.dateDepot}"></td>
			          <td>
			            <span class="badge bg-warning" th:text="${d.statut}"></span>
			          </td>
			          <td th:text="${d.agentResponsable.username}"></td>

			          <td>
			            <a th:href="@{'/demandes/statut/' + ${d.id} + '/VALIDEE'}"
			               class="btn btn-success btn-sm">Valider</a>

			            <a th:href="@{'/demandes/statut/' + ${d.id} + '/REJETEE'}"
			               class="btn btn-danger btn-sm">Rejeter</a>
			          </td>
			        </tr>
			      </tbody>
			    </table>
          </div>
          <div class="card-footer bg-white">
            <nav>
              <ul class="pagination pagination-sm mb-0 justify-content-end">
                <li class="page-item disabled">
                  <a class="page-link" href="#">Précédent</a>
                </li>
                <li class="page-item active">
                  <a class="page-link" href="#">1</a>
                </li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item">
                  <a class="page-link" href="#">Suivant</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
