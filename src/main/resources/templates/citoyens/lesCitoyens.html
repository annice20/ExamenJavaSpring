<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --sidebar-width: 250px;
      }
      body {
        background-color: #f8f9fa;
      }
      #sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        position: fixed;
        background: #212529;
        transition: all 0.3s;
      }
      #sidebar .nav-link {
        color: #adb5bd;
        margin: 5px 15px;
        border-radius: 5px;
      }
      #sidebar .nav-link:hover,
      #sidebar .nav-link.active {
        background: #343a40;
        color: #fff;
      }
      #content {
        margin-left: var(--sidebar-width);
        width: calc(100% - var(--sidebar-width));
      }
      .stat-card {
        border: none;
        border-left: 5px solid #4e73df;
      }
    </style>
  </head>
  <body>
    <nav id="sidebar" class="d-none d-md-block">
      <div class="p-3 text-white text-center"><h5>ADMIN PANEL</h5></div>
      <hr class="text-secondary" />
      <ul class="nav flex-column">
        <li class="nav-item">
          <a href="#" class="nav-link active"
            ><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a
          >
        </li>
        <li class="nav-item">
          <a href="#form-section" class="nav-link"
            ><i class="fas fa-edit me-2"></i> Formulaires</a
          >
        </li>
        <li class="nav-item">
          <a href="#table-section" class="nav-link"
            ><i class="fas fa-table me-2"></i> Données</a
          >
        </li>
        <li class="nav-item">
          <a href="index.html" class="nav-link"
            ><i class="fas fa-sign-out-alt me-2"></i> Déconnexion</a
          >
        </li>
      </ul>
    </nav>

    <div id="content">
      <nav
        class="navbar navbar-expand-lg navbar-light bg-white shadow-sm p-3 mb-4"
      >
        <div class="container-fluid">
          <form class="d-flex w-50">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Rechercher..."
            />
          </form>
          <div class="dropdown">
            <a
              class="nav-link dropdown-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              >Admin User <i class="fas fa-user-circle"></i
            ></a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#">Profil</a></li>
              <li><hr class="dropdown-divider" /></li>
              <li><a class="dropdown-item" href="#">Déconnexion</a></li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container-fluid px-4">
        <div class="card shadow-sm" id="table-section">
          <div
            class="card-header bg-white d-flex justify-content-between align-items-center"
          >
            <h6 class="mb-0">Liste des clients</h6>
            <input
              type="text"
              class="form-control form-control-sm w-25"
              placeholder="Filtrer..."
            />
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
					<th>Photo</th>
                    <th>Numéro national</th>
                    <th>Nom</th>
                    <th>Adresse</th>
                    <th>Sexe</th>
                    <th>Date de naissance</th>
                </tr>
              </thead>
			  <tbody>
			      <tr th:each="citoyen : ${citoyens}">
					<td>
					    <img th:if="${citoyen.photo != null and citoyen.photo != ''}"
					         th:src="@{'/uploads/' + ${citoyen.photo}}"
					         style="width:50px; height:50px; border-radius:50%; object-fit:cover;" />
					    <i th:unless="${citoyen.photo != null and citoyen.photo != ''}"
					       class="fas fa-user-circle fa-2x text-secondary"></i>
					  </td>
			          <td th:text="${citoyen.numeroNational}"></td>
			          <td th:text="${citoyen.nom + ' ' + citoyen.prenom}"></td>
			          <td th:text="${citoyen.adresse}"></td>
			          <td th:text="${citoyen.sexe}"></td>
			          <td th:text="${citoyen.dateNaissance}"></td>
			      </tr>
			  </tbody>
            </table>
          </div>
          <div class="card-footer bg-white">
            <nav>
              <ul class="pagination pagination-sm mb-0 justify-content-end">
                <li class="page-item disabled">
                  <a class="page-link" href="#">Précédent</a>
                </li>
                <li class="page-item active">
                  <a class="page-link" href="#">1</a>
                </li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item">
                  <a class="page-link" href="#">Suivant</a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const ctx = document.getElementById("myChart").getContext("2d");
      new Chart(ctx, {
        type: "line",
        data: {
          labels: ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin"],
          datasets: [
            {
              label: "Ventes 2026",
              data: [12, 19, 3, 5, 2, 3],
              borderColor: "#4e73df",
              tension: 0.3,
            },
          ],
        },
      });
    </script>
  </body>
</html>
