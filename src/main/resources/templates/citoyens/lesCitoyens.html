<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>E-CIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root { --sidebar-width: 250px; }
        body { background-color: #f8f9fa; }
        #sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #212529; transition: all 0.3s; z-index: 1000; }
        #sidebar .nav-link { color: #adb5bd; margin: 5px 15px; border-radius: 5px; }
        #sidebar .nav-link:hover, #sidebar .nav-link.active { background: #343a40; color: #fff; }
        #content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); }
        .dropdown-menu-dark .dropdown-item { color: #adb5bd; }
        .dropdown-menu-dark .dropdown-item:hover { background: #495057; color: white; }
		.table-responsive { overflow: visible !important; }
		.ajout { width: 160px; padding: 15px; margin-top: 1rem; margin-bottom: 1rem; margin-left: 1rem;}
    </style>
</head>
<body>

    <nav id="sidebar" class="d-none d-md-block">
        <div class="p-3 text-white text-center"><h5>E-CIN</h5></div>
        <hr class="text-secondary" />
        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="/dashboard" class="nav-link active"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="/citoyens/liste" class="nav-link"><i class="fas fa-edit me-2"></i> Citoyens</a>
            </li>
			<li class="nav-item">
			    <a href="/demandes/listedemande" class="nav-link"><i class="fas fa-edit me-2"></i> Demandes</a>
			</li>
            
            <li class="nav-item dropdown px-3">
                <a class="nav-link dropdown-toggle position-relative" href="#" id="notifDrop" role="button" data-bs-toggle="dropdown">
                    <i class="fas fa-bell me-2"></i> Notifications
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${notifications != null and !notifications.isEmpty()}"
                          th:text="${notifications.size()}">
                    </span>
                </a>
                <ul class="dropdown-menu dropdown-menu-dark shadow" aria-labelledby="notifDrop" style="width: 250px; max-height: 300px; overflow-y: auto;">
                    <li th:if="${notifications == null or notifications.isEmpty()}" class="p-2 text-center small text-muted">
                        Aucune notification
                    </li>
                    <li th:each="n : ${notifications}">
                        <div class="dropdown-item border-bottom border-secondary py-2" style="white-space: normal;">
                            <div class="small fw-bold" th:text="${n.message}"></div>
                            <small class="text-muted" th:text="${#temporals.format(n.date, 'dd/MM/yyyy HH:mm')}"></small>
                        </div>
                    </li>
                </ul>
            </li>
        </ul>
    </nav>

    <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm p-3 mb-4">
            <div class="container-fluid">
				<form th:action="@{/citoyens/liste}" method="get" class="d-flex w-50">
				    <input class="form-control me-2" 
				           type="search" 
				           name="keyword" 
				           th:value="${keyword}" 
				           placeholder="Rechercher par nom, prénom ou CIN..." 
				           aria-label="Search">
				    <button class="btn btn-outline-primary" type="submit">
				        <i class="fas fa-search"></i>
				    </button>
				</form>
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Admin User <i class="fas fa-user-circle"></i></a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/logout">Déconnexion</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">Liste des citoyens</h6>
                </div>
				<a href="/citoyens/creer" class="btn btn-outline-primary ajout">Ajouter</a>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Photo</th>
                                <th>Numéro National</th>
                                <th>Nom Complet</th>
                                <th>Sexe</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="citoyen : ${citoyens}">
                                <td>
                                    <img th:if="${citoyen.photo != null and citoyen.photo != ''}"
                                         th:src="@{'/uploads/' + ${citoyen.photo}}"
                                         style="width:40px; height:40px; border-radius:50%; object-fit:cover;" />
                                    <i th:unless="${citoyen.photo != null and citoyen.photo != ''}" class="fas fa-user-circle fa-2x text-secondary"></i>
                                </td>
                                <td th:text="${citoyen.numeroNational}"></td>
                                <td th:text="${citoyen.nom + ' ' + citoyen.prenom}"></td>
                                <td th:text="${citoyen.sexe}"></td>
                                <td>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-primary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                            Actions
                                        </button>
                                        <ul class="dropdown-menu shadow">
                                            <li>
                                                <a class="dropdown-item" th:href="@{'/demandes/creerdemande/' + ${citoyen.id}}">
                                                    <i class="fas fa-file-alt me-2 text-primary"></i> Nouvelle Demande
                                                </a>
                                            </li>
                                            <li>
                                                <a class="dropdown-item" th:href="@{'/citoyens/edit/' + ${citoyen.id}}">
                                                    <i class="fas fa-edit me-2 text-warning"></i> Modifier
                                                </a>
                                            </li>
                                        </ul>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
