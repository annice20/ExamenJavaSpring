<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    :root { --sidebar-width: 250px; }

    body { background-color: #f8f9fa; }

    #sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      position: fixed;
      background: #212529;
    }

    #sidebar .nav-link {
      color: #adb5bd;
      margin: 5px 15px;
      border-radius: 5px;
    }

    #sidebar .nav-link:hover,
    #sidebar .nav-link.active {
      background: #343a40;
      color: #fff;
    }

    #content {
      margin-left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
    }
	
	#regionChart {
	  max-height: 500px;
	}
  </style>
</head>

<body>

<!-- SIDEBAR -->
<nav id="sidebar" class="d-none d-md-block">
        <div class="p-3 text-white text-center"><h5>ADMIN PANEL</h5></div>
        <hr class="text-secondary" />
        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="/dashboard" class="nav-link active"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="/citoyens/liste" class="nav-link"><i class="fas fa-edit me-2"></i> Citoyens</a>
            </li>
			<li class="nav-item">
			    <a href="/demandes/listedemande" class="nav-link"><i class="fas fa-edit me-2"></i> Citoyens</a>
			</li>
            
            <li class="nav-item dropdown px-3">
                <a class="nav-link dropdown-toggle position-relative" href="#" id="notifDrop" role="button" data-bs-toggle="dropdown">
                    <i class="fas fa-bell me-2"></i> Notifications
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${notifications != null and !notifications.isEmpty()}"
                          th:text="${notifications.size()}">
                    </span>
                </a>
                <ul class="dropdown-menu dropdown-menu-dark shadow" aria-labelledby="notifDrop" style="width: 250px; max-height: 300px; overflow-y: auto;">
                    <li th:if="${notifications == null or notifications.isEmpty()}" class="p-2 text-center small text-muted">
                        Aucune notification
                    </li>
                    <li th:each="n : ${notifications}">
                        <div class="dropdown-item border-bottom border-secondary py-2" style="white-space: normal;">
                            <div class="small fw-bold" th:text="${n.message}"></div>
                            <small class="text-muted" th:text="${#temporals.format(n.date, 'dd/MM/yyyy HH:mm')}"></small>
                        </div>
                    </li>
                </ul>
            </li>
        </ul>
    </nav>
<!-- CONTENT -->
<div id="content">

  <!-- TOPBAR -->
  <nav class="navbar bg-white shadow-sm p-3 mb-4">
    <div class="container-fluid">
      <input class="form-control w-50" placeholder="Rechercher...">
      <div>
        <strong>Admin</strong>
        <i class="fas fa-user-circle"></i>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4">

    <!-- ALERT -->
    <div th:if="${retard > 0}" class="alert alert-danger">
      ⚠️ <strong th:text="${retard}"></strong> dossiers en retard !
    </div>

    <!-- INDICATEURS -->
    <div class="row g-3 mb-4">

      <div class="col-md-3">
        <div class="card p-3 shadow-sm">
          <h6>Citoyens</h6>
          <div class="h4" th:text="${totalCitoyens}"></div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3 shadow-sm">
          <h6>Cartes délivrées</h6>
          <div class="h4 text-success" th:text="${cartes}"></div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3 shadow-sm">
          <h6>En attente</h6>
          <div class="h4 text-warning" th:text="${attente}"></div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card p-3 shadow-sm">
          <h6>Validées</h6>
          <div class="h4 text-primary" th:text="${validees}"></div>
        </div>
      </div>

    </div>

    <!-- CHARTS -->
    <div class="row mb-4">

      <div class="col-md-6">
        <div class="card p-3 shadow-sm">
          <h6>Statistiques mensuelles</h6>
          <canvas id="lineChart"></canvas>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card p-3 shadow-sm">
          <h6>Répartition des demandes</h6>
          <canvas id="pieChart"></canvas>
        </div>
      </div>

    </div>

    <!-- REGION -->
    <div class="card p-3 shadow-sm mb-4">
      <h6>Répartition par région</h6>
      <canvas id="regionChart"></canvas>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

// PIE CHART (statuts)
const stats = {
  enAttente: /*[[${stats['EN_ATTENTE']}]]*/ 0,
  enCours: /*[[${stats['EN_COURS']}]]*/ 0,
  validee: /*[[${stats['VALIDEE']}]]*/ 0,
  rejetee: /*[[${stats['REJETEE']}]]*/ 0,
  imprimee: /*[[${stats['IMPRIMEE']}]]*/ 0
};

new Chart(document.getElementById("pieChart"), {
  type: 'pie',
  data: {
    labels: ["En attente", "En cours", "Validée", "Rejetée", "Imprimée"],
    datasets: [{
      data: Object.values(stats),
      backgroundColor: ["#ffc107","#0d6efd","#198754","#dc3545","#6f42c1"]
    }]
  }
});

// LINE CHART
const mensuel = /*[[${mensuel}]]*/ [];

new Chart(document.getElementById("lineChart"), {
  type: 'line',
  data: {
    labels: ["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"],
    datasets: [{
      label: "Demandes",
      data: mensuel,
      borderColor: "#4e73df",
      tension: 0.3
    }]
  }
});

const regions = /*[[${regions}]]*/ {};

new Chart(document.getElementById("regionChart"), {
  type: 'bar',
  data: {
    labels: Object.keys(regions),
    datasets: [{
      label: "Citoyens",
      data: Object.values(regions)
    }]
  }
});

</script>

</body>
</html>
